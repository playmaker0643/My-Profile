<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" role="img">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0" stop-color="#0a0e17"/>
<stop offset="1" stop-color="#131a2b"/>
</linearGradient>
<linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
<stop offset="0" stop-color="#3b82f6"/>
<stop offset="1" stop-color="#a855f7"/>
</linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="640" height="400" fill="url(#bg)"/>
<g opacity="0.08">
<path d="M0 40 H640 M0 120 H640 M0 200 H640 M0 280 H640 M0 360 H640" stroke="#3b82f6" stroke-width="1"/>
</g>
<rect x="0" y="0" width="640" height="36" fill="#0d1220"/>
<circle cx="18" cy="18" r="5" fill="#ef4444"/>
<circle cx="36" cy="18" r="5" fill="#f59e0b"/>
<circle cx="54" cy="18" r="5" fill="#22c55e"/>

<rect x="24" y="52" width="284" height="324" rx="10" fill="#0f1626" stroke="#334155"/>
<text x="40" y="78" font-family="sans-serif" font-size="12" fill="#e6edf3" font-weight="600">Enter a problem</text>
<rect x="40" y="92" width="252" height="40" rx="8" fill="#16233a" stroke="#3b82f6" stroke-width="1"/>
<text x="52" y="117" font-family="monospace" font-size="13" fill="#e6edf3">∫ (3x² + 2x) dx</text>
<rect x="40" y="146" width="252" height="1" fill="#22334a"/>
<text x="40" y="172" font-family="sans-serif" font-size="11" fill="#94a3b8">Step-by-step solution</text>
<text x="40" y="196" font-family="monospace" font-size="12" fill="#22d3ee">1. Apply power rule</text>
<text x="40" y="218" font-family="monospace" font-size="12" fill="#94a3b8">   ∫3x² dx = x³</text>
<text x="40" y="240" font-family="monospace" font-size="12" fill="#22d3ee">2. Integrate 2x</text>
<text x="40" y="262" font-family="monospace" font-size="12" fill="#94a3b8">   ∫2x dx = x²</text>
<rect x="40" y="284" width="252" height="34" rx="8" fill="#152238" stroke="#22d3ee" stroke-opacity="0.4"/>
<text x="52" y="306" font-family="monospace" font-size="13" fill="#fff">= x³ + x² + C</text>
<rect x="324" y="52" width="292" height="324" rx="10" fill="#0f1626" stroke="#334155"/>
<text x="340" y="78" font-family="sans-serif" font-size="12" fill="#e6edf3" font-weight="600">Graph view</text>
<g stroke="#22334a"><path d="M340 220 H600 M470 100 V340"/></g>
<path d="M340 320 C 400 280 440 140 600 110" stroke="url(#acc)" stroke-width="2.5" fill="none" filter="url(#glow)"/>

</svg>